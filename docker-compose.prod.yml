# ============================================
# Tota Compania - Production (Hetzner VPS)
# ============================================

services:
  caddy:
    image: caddy:2-alpine
    container_name: totacompania-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - totacompania
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  totacompania:
    build:
      context: .
      dockerfile: Dockerfile
    image: totacompania:latest
    container_name: totacompania
    restart: unless-stopped
    depends_on:
      - mongodb
    expose:
      - "3101"
    volumes:
      - ./public/uploads:/app/public/uploads
      - ./public/documents:/app/public/documents
      - ./public/images:/app/public/images
    environment:
      - NODE_ENV=production
      - NEXTAUTH_SECRET=totacompania-prod-8f3k2m9x7b4n1p6q
      - NEXTAUTH_URL=https://totacompania.fr
      - MONGODB_URI=mongodb://mongodb:27017/totacompania
      - TZ=Europe/Paris
    healthcheck:
      test: ["CMD", "node", "-e", "require(\"http\").get(\"http://localhost:3101/\", (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on(\"error\", () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 128M

  mongodb:
    image: mongo:7
    container_name: totacompania-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      - TZ=Europe/Paris
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  mongodb_data:
  mongodb_config:
  caddy_data:
  caddy_config:

networks:
  default:
    name: totacompania-network
